<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Lead Scraper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="container">
    <h1>Business Lead Scraper</h1>
    <p>Scrape business data from Google Maps & export to Excel</p>
  </div>
</header>

<div class="container">
  <div class="card">
    <h2>Start a New Scrape</h2>

    <div class="step">
      <div class="step-number">1</div>
      <div class="step-content">
        <label for="stateSelect">Select US State</label>
        <select id="stateSelect">
          <option value="">-- Select a state --</option>
        </select>
      </div>
    </div>

    <div class="step" id="cityStep" style="display:none;">
      <div class="step-number">2</div>
      <div class="step-content">
        <label>Choose Cities <span id="cityCount">(0 selected)</span></label>
        <div id="cityCheckboxes" class="city-list"></div>
        <div class="city-actions">
          <button type="button" class="btn btn-sm" id="selectAllBtn">Select All</button>
          <button type="button" class="btn btn-sm" id="deselectAllBtn">Deselect All</button>
        </div>
      </div>
    </div>

    <div class="step" id="nicheStep" style="display:none;">
      <div class="step-number">3</div>
      <div class="step-content">
        <label for="nicheInput">Business Niche / Category</label>
        <input type="text" id="nicheInput" placeholder="e.g. coffee shop, restaurant, dentist, plumber..." value="businesses">
        <div class="niche-suggestions">
          <span class="niche-label">Quick picks:</span>
          <button type="button" class="niche-chip" data-niche="businesses">All Businesses</button>
          <button type="button" class="niche-chip" data-niche="coffee shop">Coffee Shop</button>
          <button type="button" class="niche-chip" data-niche="restaurant">Restaurant</button>
          <button type="button" class="niche-chip" data-niche="dentist">Dentist</button>
          <button type="button" class="niche-chip" data-niche="salon">Salon / Barber</button>
          <button type="button" class="niche-chip" data-niche="plumber">Plumber</button>
          <button type="button" class="niche-chip" data-niche="gym">Gym / Fitness</button>
          <button type="button" class="niche-chip" data-niche="lawyer">Lawyer</button>
          <button type="button" class="niche-chip" data-niche="real estate agent">Real Estate</button>
        </div>
      </div>
    </div>

    <div class="step" id="goStep" style="display:none;">
      <div class="step-number"></div>
      <div class="step-content">
        <button id="startBtn" class="btn btn-primary btn-lg" disabled>
          <span class="btn-icon">&#9654;</span> Start Scraping
        </button>
        <div id="estimateBox" class="estimate-box">
          <div class="estimate-row">
            <span class="estimate-icon">&#128202;</span>
            <span id="estimateText">Loading estimate...</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="progressSection" class="card progress-section">
    <h2>Scraping Progress</h2>

    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value" id="statProgress">0%</div>
        <div class="stat-label">Progress</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statCities">0/0</div>
        <div class="stat-label">Cities Done</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statBusinesses">0</div>
        <div class="stat-label">Leads Found</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statStatus">Idle</div>
        <div class="stat-label">Status</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statElapsed">--</div>
        <div class="stat-label">Elapsed</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statEta">--</div>
        <div class="stat-label">ETA</div>
      </div>
    </div>

    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="cityStatus"></div>

    <div class="log-container" id="logContainer">
      <div class="log-entry info">Waiting to start...</div>
    </div>

    <div class="btn-group" style="margin-top:12px;">
      <button id="downloadBtn" class="btn btn-success">
        Download Excel
      </button>
      <button id="cancelBtn" class="btn btn-danger">
        Cancel
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
