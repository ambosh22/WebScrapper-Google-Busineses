services:
  - type: web
    name: google-maps-scraper
    runtime: node
    buildCommand: export PLAYWRIGHT_BROWSERS_PATH=/opt/render/.cache/ms-playwright && python3 -m pip install -r requirements.txt && npm install && python3 -m rebrowser_playwright install chromium chromium-headless-shell
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SCRAPER_PROXY
        sync: false
