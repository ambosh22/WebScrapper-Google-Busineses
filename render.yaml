services:
  - type: web
    name: google-maps-scraper
    runtime: node
    buildCommand: npm install && PLAYWRIGHT_BROWSERS_PATH=/opt/render/.cache/ms-playwright npx --no-install playwright install chromium
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
